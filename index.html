<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jasper Anthony</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0e0e10;
      --surface: rgba(255, 255, 255, 0.04);
      --surface-hover: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.18);
      --text-primary: #f0eee9;
      --text-muted: #7a7875;
      --pastel-lavender: #c9b8e8;
      --pastel-rose: #e8b8c9;
      --pastel-sky: #b8d4e8;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Background image layer — swap the URL with your own image when ready */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('https://picsum.photos/seed/jasper/1200/800');
      background-size: cover;
      background-position: center;
      opacity: 0.18;
      z-index: 0;
    }

    /* Subtle grain texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
      z-index: 0;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* ── Avatar ── */
    .avatar-wrap {
      position: relative;
      width: 96px;
      height: 96px;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid var(--border);
      background: var(--surface);
      display: block;

      /* Remove the src below and set it to your actual photo path */
    }

    .avatar-placeholder {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: var(--text-muted);
      letter-spacing: -0.5px;
    }

    .avatar-glow {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,184,232,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Identity ── */
    .identity {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .name {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: -0.3px;
      color: var(--text-primary);
      line-height: 1.1;
    }

    .bio {
      font-size: 13.5px;
      color: var(--text-muted);
      font-style: italic;
      font-weight: 300;
      letter-spacing: 0.2px;
    }

    /* ── Links ── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 20px;
      border-radius: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.1px;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      cursor: pointer;
    }

    .link-btn:hover {
      background: var(--surface-hover);
      border-color: var(--border-hover);
      transform: translateY(-1px);
    }

    .link-btn:active {
      transform: translateY(0);
    }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 18px;
      height: 18px;
    }

    .link-btn--instagram .link-icon {
      background: rgba(232, 184, 201, 0.12);
    }
    .link-btn--instagram .link-icon svg { color: var(--pastel-rose); fill: var(--pastel-rose); }

    .link-btn--linkedin .link-icon {
      background: rgba(184, 212, 232, 0.12);
    }
    .link-btn--linkedin .link-icon svg { color: var(--pastel-sky); fill: var(--pastel-sky); }

    .link-btn--twitter .link-icon {
      background: rgba(201, 184, 232, 0.12);
    }
    .link-btn--twitter .link-icon svg { color: var(--pastel-lavender); fill: var(--pastel-lavender); }

    .link-label {
      flex: 1;
    }

    .link-arrow {
      color: var(--text-muted);
      font-size: 16px;
      transition: color 0.2s;
    }

    .link-btn:hover .link-arrow {
      color: var(--text-primary);
    }

    /* ── Footer ── */
    .footer {
      font-size: 11px;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Avatar — swap src with your actual photo path when ready -->
    <div class="avatar-wrap">
      <img class="avatar" src="https://picsum.photos/seed/jasper/200/200" alt="Jasper Anthony" />
      <div class="avatar-glow"></div>
    </div>

    <!-- Identity -->
    <div class="identity">
      <h1 class="name">Jasper Anthony</h1>
      <p class="bio">nobody that is aiming to be somebody</p>
    </div>

    <!-- Links -->
    <div class="links">

      <a class="link-btn link-btn--instagram" href="https://instagram.com" target="_blank" rel="noopener">
        <div class="link-icon">
          <!-- Instagram icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <circle cx="12" cy="12" r="4"/>
            <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <span class="link-label">Instagram</span>
        <span class="link-arrow">↗</span>
      </a>

      <a class="link-btn link-btn--linkedin" href="https://linkedin.com" target="_blank" rel="noopener">
        <div class="link-icon">
          <!-- LinkedIn icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="2" y="9" width="4" height="12" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="4" cy="4" r="2" fill="none" stroke="currentColor" stroke-width="1.75"/>
          </svg>
        </div>
        <span class="link-label">LinkedIn</span>
        <span class="link-arrow">↗</span>
      </a>

      <a class="link-btn link-btn--twitter" href="https://x.com" target="_blank" rel="noopener">
        <div class="link-icon">
          <!-- X / Twitter icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
        </div>
        <span class="link-label">X (Twitter)</span>
        <span class="link-arrow">↗</span>
      </a>

    </div>

    <p class="footer">jasperanthony.me</p>

  </div>

</body>
</html>
